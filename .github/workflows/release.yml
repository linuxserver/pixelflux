name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]*'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify release notes exist
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ ! -f "release-notes/${TAG}.md" ]; then
            echo "::error::release-notes/${TAG}.md not found"
            exit 1
          fi

  build:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            platform: manylinux
            build: >-
              cp39-manylinux_x86_64
              cp310-manylinux_x86_64
              cp311-manylinux_x86_64
              cp312-manylinux_x86_64
              cp313-manylinux_x86_64
              cp314-manylinux_x86_64
          - arch: x86_64
            runner: ubuntu-latest
            platform: musllinux
            build: >-
              cp39-musllinux_x86_64
              cp310-musllinux_x86_64
              cp311-musllinux_x86_64
              cp312-musllinux_x86_64
              cp313-musllinux_x86_64
              cp314-musllinux_x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            platform: manylinux
            build: >-
              cp39-manylinux_aarch64
              cp310-manylinux_aarch64
              cp311-manylinux_aarch64
              cp312-manylinux_aarch64
              cp313-manylinux_aarch64
              cp314-manylinux_aarch64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            platform: musllinux
            build: >-
              cp39-musllinux_aarch64
              cp310-musllinux_aarch64
              cp311-musllinux_aarch64
              cp312-musllinux_aarch64
              cp313-musllinux_aarch64
              cp314-musllinux_aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_BUILD: ${{ matrix.build }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.arch }}-${{ matrix.platform }}
          path: wheelhouse/*.whl

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: wheelhouse
          merge-multiple: true

      - name: Get release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          {
            echo "content<<EOF"
            cat "release-notes/${TAG}.md"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.content }}
          prerelease: false
          files: wheelhouse/*.whl
